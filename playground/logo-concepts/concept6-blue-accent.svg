<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Concept 6: Favicon with blue accent - "Blues" Brothers nod via color -->

  <!-- Background circle (optional, comment out for transparent) -->
  <!-- <circle cx="50" cy="50" r="48" fill="#0d1117"/> -->

  <!-- Left lens -->
  <rect x="10" y="32" width="33" height="28" rx="5" ry="5" fill="#1e3a5f"/>
  <!-- Right lens -->
  <rect x="57" y="32" width="33" height="28" rx="5" ry="5" fill="#1e3a5f"/>

  <!-- Bridge -->
  <line x1="43" y1="42" x2="57" y2="42" stroke="#1e3a5f" stroke-width="4" stroke-linecap="round"/>

  <!-- Temple arms -->
  <line x1="10" y1="38" x2="3" y2="33" stroke="#1e3a5f" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="90" y1="38" x2="97" y2="33" stroke="#1e3a5f" stroke-width="3.5" stroke-linecap="round"/>

  <!-- { in left lens -->
  <text x="26.5" y="52" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="700" fill="#5ba4e6" text-anchor="middle">{</text>

  <!-- | between lenses -->
  <text x="50" y="52" font-family="JetBrains Mono, Consolas, monospace" font-size="16" font-weight="700" fill="#5ba4e6" text-anchor="middle">|</text>

  <!-- } in right lens -->
  <text x="73.5" y="52" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="700" fill="#5ba4e6" text-anchor="middle">}</text>
</svg>