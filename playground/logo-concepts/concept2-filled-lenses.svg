<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="400" height="200">
  <!-- Concept 2: Filled dark lenses with light braces inside - more Blues Brothers feel -->

  <!-- Left lens -->
  <rect x="15" y="20" width="72" height="52" rx="6" ry="6" fill="#1a1a2e"/>
  <!-- Right lens -->
  <rect x="113" y="20" width="72" height="52" rx="6" ry="6" fill="#1a1a2e"/>

  <!-- Bridge -->
  <line x1="87" y1="38" x2="113" y2="38" stroke="#1a1a2e" stroke-width="6" stroke-linecap="round"/>

  <!-- Temple arms -->
  <line x1="15" y1="30" x2="2" y2="22" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>
  <line x1="185" y1="30" x2="198" y2="22" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>

  <!-- { in left lens (light on dark) -->
  <text x="51" y="56" font-family="JetBrains Mono, Consolas, monospace" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">{</text>

  <!-- | between lenses -->
  <text x="100" y="56" font-family="JetBrains Mono, Consolas, monospace" font-size="30" font-weight="700" fill="#1a1a2e" text-anchor="middle">|</text>

  <!-- } in right lens (light on dark) -->
  <text x="149" y="56" font-family="JetBrains Mono, Consolas, monospace" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle">}</text>
</svg>