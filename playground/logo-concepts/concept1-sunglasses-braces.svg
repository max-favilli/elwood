<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="400" height="200">
  <!-- Concept 1: Wayfarer sunglasses with { } as lenses, | as bridge -->

  <!-- Left lens frame -->
  <rect x="15" y="20" width="72" height="55" rx="8" ry="8" fill="none" stroke="#1a1a2e" stroke-width="6"/>
  <!-- Right lens frame -->
  <rect x="113" y="20" width="72" height="55" rx="8" ry="8" fill="none" stroke="#1a1a2e" stroke-width="6"/>

  <!-- Bridge (pipe symbol) -->
  <line x1="87" y1="38" x2="113" y2="38" stroke="#1a1a2e" stroke-width="6" stroke-linecap="round"/>

  <!-- Left temple arm -->
  <line x1="15" y1="32" x2="2" y2="25" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>
  <!-- Right temple arm -->
  <line x1="185" y1="32" x2="198" y2="25" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>

  <!-- { in left lens -->
  <text x="51" y="58" font-family="JetBrains Mono, Consolas, monospace" font-size="36" font-weight="700" fill="#1a1a2e" text-anchor="middle">{</text>

  <!-- } in right lens -->
  <text x="149" y="58" font-family="JetBrains Mono, Consolas, monospace" font-size="36" font-weight="700" fill="#1a1a2e" text-anchor="middle">}</text>

  <!-- | as the nose bridge detail -->
  <text x="100" y="58" font-family="JetBrains Mono, Consolas, monospace" font-size="32" font-weight="700" fill="#1a1a2e" text-anchor="middle">|</text>
</svg>