name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  test:
    name: Test
    uses: ./.github/workflows/ci.yml

  nuget:
    name: Publish NuGet
    needs: test
    runs-on: ubuntu-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Pack
        run: |
          dotnet pack dotnet/src/Elwood.Core/Elwood.Core.csproj -c Release
          dotnet pack dotnet/src/Elwood.Json/Elwood.Json.csproj -c Release
          dotnet pack dotnet/src/Elwood.Pipeline/Elwood.Pipeline.csproj -c Release
          dotnet pack dotnet/src/Elwood.Pipeline.Azure/Elwood.Pipeline.Azure.csproj -c Release
          dotnet pack dotnet/src/Elwood.Cli/Elwood.Cli.csproj -c Release
          dotnet pack dotnet/src/Elwood.Xlsx/Elwood.Xlsx.csproj -c Release
          dotnet pack dotnet/src/Elwood.Parquet/Elwood.Parquet.csproj -c Release
      - name: Push to NuGet
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          dotnet nuget push dotnet/src/Elwood.Core/bin/Release/*.nupkg            --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push dotnet/src/Elwood.Json/bin/Release/*.nupkg            --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push dotnet/src/Elwood.Pipeline/bin/Release/*.nupkg        --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push dotnet/src/Elwood.Pipeline.Azure/bin/Release/*.nupkg  --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push dotnet/src/Elwood.Cli/bin/Release/*.nupkg             --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push dotnet/src/Elwood.Xlsx/bin/Release/*.nupkg            --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
          dotnet nuget push dotnet/src/Elwood.Parquet/bin/Release/*.nupkg         --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate

  npm:
    name: Publish npm
    needs: test
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Install & Build core
        working-directory: ts
        run: |
          npm ci
          npm run build
      - name: Install & Build xlsx
        working-directory: ts-xlsx
        run: |
          npm ci
          npm run build
      - name: Publish core
        if: ${{ env.NPM_TOKEN != '' }}
        working-directory: ts
        run: npm publish --access public
      - name: Publish xlsx
        if: ${{ env.NPM_TOKEN != '' }}
        working-directory: ts-xlsx
        run: npm publish --access public
      # ts-parquet not published — hyparquet is async-only and Elwood's TS extension API
      # is sync-only. See docs/known-issues.md. Tracked as a follow-up.

  native-binaries:
    name: Native AOT (${{ matrix.os }})
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: elwood-linux-x64
            binary: Elwood.Cli
          - os: macos-latest
            rid: osx-x64
            artifact: elwood-macos-x64
            binary: Elwood.Cli
          - os: windows-latest
            rid: win-x64
            artifact: elwood-win-x64
            binary: Elwood.Cli.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Publish AOT
        run: dotnet publish dotnet/src/Elwood.Cli/Elwood.Cli.csproj -c Release -r ${{ matrix.rid }} -p:PublishAot=true
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dotnet/src/Elwood.Cli/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.binary }}

  github-release:
    name: Create GitHub Release
    needs: [native-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/elwood-linux-x64/Elwood.Cli release/elwood-linux-x64
          cp artifacts/elwood-macos-x64/Elwood.Cli release/elwood-macos-x64
          cp artifacts/elwood-win-x64/Elwood.Cli.exe release/elwood-win-x64.exe
          chmod +x release/elwood-linux-x64 release/elwood-macos-x64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/elwood-linux-x64
            release/elwood-macos-x64
            release/elwood-win-x64.exe
