name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  dotnet:
    name: .NET
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build
        run: dotnet build dotnet/Elwood.slnx
      - name: Test (non-integration)
        # Runs Core, Json, Pipeline, CLI, Parquet, and Pipeline.Azure tests.
        # Pipeline.Azure.Tests are integration tests using Testcontainers — they spin
        # real Redis + Azurite containers. Docker is pre-installed on ubuntu-latest,
        # so they "just work" here. Locally, devs without Docker should run with
        # --filter "Category!=Integration" to skip them.
        run: dotnet test dotnet/Elwood.slnx --filter "Category!=Integration" --verbosity normal

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        working-directory: ts
        run: npm ci
      - name: Test
        working-directory: ts
        run: npm test

  conformance:
    name: Conformance Check
    needs: [dotnet, typescript]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Both implementations passed all conformance tests"
